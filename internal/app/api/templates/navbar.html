<div class="flex">
    <div id="tabs" class="flex flex-col justify-start border-r {{template "ui-border-clr"}} tab-list pr-2 pb-6 pt-2">
        {{ if .IsAuthenticated }}
        <div class="pt-1 pb-1 w-full">
            <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4" data-path="/" hx-get="/"
                hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content" hx-push-url="true"
                hx-sync="closest #tabs:abort">Home</button>
        </div>
        {{ end }}
        {{ if .IsStreamer }}
        <div class="pt-1 pb-1 w-full">
            <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                data-path="/characters,/universal-tts,/agentic" hx-get="/characters" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                hx-push-url="true" hx-sync="closest #tabs:abort">Characters</button>
        </div>
        <div class="pt-1 pb-1 w-full">
            <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                data-path="/filters" hx-get="/filters" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                hx-push-url="true" hx-sync="closest #tabs:abort">Settings</button>
        </div>
        {{ end }}
        {{ if .IsMod }}
        <div class="border-t {{template "ui-border-clr"}} pt-1 pb-1">
            <div class="pt-1 pb-1 w-full">
                <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                    data-path="/mod" hx-get="/mod" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                    hx-push-url="true" hx-sync="closest #tabs:abort">Mod Page</button>
            </div>
        </div>
        {{ end }}
        {{ if .IsAdmin }}
        <div class="border-t {{template "ui-border-clr"}} pt-1 pb-1">
            <div class="pt-1 pb-1 w-full">
                <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                    data-path="/admin" hx-get="/admin" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                    hx-push-url="true" hx-sync="closest #tabs:abort">Admin Page</button>
            </div>
        </div>
        {{ end }}
        <div class="w-max border-t {{template "ui-border-clr"}} pt-1 pb-1">
            <div class="pt-1 pb-1 w-full">
                <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                    data-path="/images" hx-get="/images" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                    hx-push-url="true" hx-sync="closest #tabs:abort">Images</button>
            </div>
            <div class="pt-1 pb-1 w-full">
                <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                    data-path="/voices" hx-get="/voices" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                    hx-push-url="true" hx-sync="closest #tabs:abort">Voices</button>
            </div>
            {{ if .IsAuthenticated }}
            <div class="pt-1 pb-1 w-full">
                <button class="flex justify-start text-xl {{template "button-1"}} w-full font-bold py-2 px-4"
                    data-path="/control" hx-get="/control" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
                    hx-push-url="true" hx-sync="closest #tabs:abort">Control Panel</button>
            </div>
            {{ end }}
        </div>
    </div>
    <div id="tab-content" class="flex flex-grow pl-10 pt-6">
        {{ .Content }}
    </div>
</div>
