<div class="flex flex-col space-y-2">
    <div class="text-sm text-gray-500 dark:text-gray-400">Press <kbd>Ctrl+C</kbd> to copy link</div>
    <div class="flex gap-2 flex-wrap">
        <a class='{{template "button-2"}} py-2 px-4' href="{{ .URL }}" target="_blank">Open image</a>
        <button type="button" data-copy-link class='{{template "button-2"}} py-2 px-4'
            onclick="navigator.clipboard.writeText(window.location.host + '{{ .URL }}'); this.textContent='Copied!'; setTimeout(()=>this.textContent='Copy link', 1200);">
            Copy link
        </button>
        {{ if .ShowImgTag }}<button type="button" class='{{template "button-2"}} py-2 px-4'
            onclick="navigator.clipboard.writeText('<img:{{ .ID }}>'); this.textContent='Copied!'; setTimeout(()=>this.textContent='Copy &lt;img:{{ .ID }}&gt;', 1200);">
            Copy &lt;img:{{ .ID }}&gt;
        </button>{{ end }}
    </div>
    <div>
        <img src="{{ .ImageURL }}" style="max-width:100%;height:auto;" />
    </div>
</div>
