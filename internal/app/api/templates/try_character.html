<div class="flex flex-col h-full p-6 gap-4" data-try-page="true" data-character-id="{{ .CharacterID }}"
    data-agentic-mode="{{ .AgenticMode }}" data-universal-mode="{{ .UniversalMode }}">
    <div class="flex items-center gap-4 border-b pb-4">
        <h1 class="text-2xl font-bold">
            {{ if .AgenticMode }}
            Try Agent Baj
            {{ else if .UniversalMode }}
            Try Universal TTS
            {{ else }}
            Try Character: {{ .CharacterName }}
            {{ end }}
        </h1>
    </div>

    <!-- Stage: same visual language as the OBS overlay -->
    <div id="try_stage" class="flex-1 relative rounded-xl overflow-hidden"
        style="background: radial-gradient(120% 120% at 50% 0%, #1b2436 0%, #0d111c 60%, #090c14 100%); min-height: 20rem;">

        <div class="absolute top-4 left-1/2 -translate-x-1/2 w-[92%] flex justify-center pointer-events-none">
            <div id="try_caption_card" class="op-card">
                <div id="try_caption_window" class="op-window" style="font-size: 18pt;">
                    <div id="try_caption_text" class="op-text"></div>
                </div>
            </div>
        </div>

        {{ if .AgenticMode }}
        <img id="char_image" src="/static/doctorWTF.png"
            style="position: absolute; left: 1rem; bottom: 0; max-height: 70%; max-width: 40%; object-fit: contain; filter: drop-shadow(0 10px 24px rgba(0,0,0,.5));" alt="Character">
        {{ else if .UniversalMode }}
        <img id="char_image" src="/static/doctorWTF.png"
            style="position: absolute; left: 1rem; bottom: 0; max-height: 70%; max-width: 40%; object-fit: contain; filter: drop-shadow(0 10px 24px rgba(0,0,0,.5));" alt="Character">
        {{ else }}
        <img id="char_image" src="/characters/{{ .CharacterID }}/image"
            style="position: absolute; left: 1rem; bottom: 0; max-height: 70%; max-width: 40%; object-fit: contain; filter: drop-shadow(0 10px 24px rgba(0,0,0,.5));" alt="Character">
        {{ end }}
    </div>

    <!-- Input area -->
    <div class="flex gap-2 items-end">
        <textarea id="message_input" rows="3" autocomplete="off" autofocus
            placeholder="Type a message…"
            class="flex-1 px-4 py-2 border-2 {{template "ui-border-clr"}} rounded resize-none min-h-24 max-h-64 overflow-y-auto text-lg {{template "input-class"}}"></textarea>
        {{ if .AgenticMode }}
        <button id="agentic_button" class="px-6 py-2 border-2 {{template "button-2"}} font-semibold">
            Generate
        </button>
        {{ else if .UniversalMode }}
        <button id="universal_tts_button" class="px-6 py-2 border-2 {{template "button-2"}} font-semibold">
            Universal TTS
        </button>
        {{ else }}
        <button id="tts_button" class="px-6 py-2 border-2 {{template "button-2"}} font-semibold">
            TTS
        </button>
        <button id="ai_button" class="px-6 py-2 border-2 {{template "button-2"}} font-semibold">
            AI
        </button>
        {{ end }}
        <button id="stop_button" class="px-6 py-2 border-2 {{template "button-2"}} font-semibold">
            Stop
        </button>
    </div>

</div>

<link rel="stylesheet" href="/static/overlay-player.css">
<script src="/static/overlay-player.js"></script>
<script src="/static/try_character.js"></script>
