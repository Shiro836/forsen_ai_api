<div class="flex flex-col h-full p-6 gap-4">
    <div class="flex items-center justify-between gap-4 border-b pb-4">
        <div class="min-w-0">
            <h1 class="text-2xl font-bold truncate">Add Reward</h1>
            <div class="text-sm text-slate-600 dark:text-slate-400 truncate">{{ .Subtitle }}</div>
        </div>

        <button class="px-4 py-2 border-2 {{template "button-2"}} font-semibold"
            hx-get="/characters" hx-select="#tab-content" hx-swap="outerHTML" hx-target="#tab-content"
            hx-push-url="true">
            Back
        </button>
    </div>

    {{ if .Error }}
    <div class="text-sm border border-red-400/70 bg-red-50 dark:bg-red-950/30 rounded px-3 py-2">
        {{ .Error }}
    </div>
    {{ end }}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="border-2 rounded {{template "ui-border-clr"}} p-4 bg-gray-50 dark:bg-gray-900">
            <div class="text-lg font-semibold mb-2">Create new reward</div>
            <div class="text-sm text-slate-600 dark:text-slate-400 mb-4">
                Creates a new Twitch reward.
            </div>
            <form hx-post="{{ .CreatePostURL }}" hx-target="#tab-content" hx-swap="outerHTML">
                <button type="submit" class="w-full px-4 py-2 border-2 {{template "button-2"}} font-semibold">
                    Create
                </button>
            </form>
        </div>

        <div class="border-2 rounded {{template "ui-border-clr"}} p-4 bg-gray-50 dark:bg-gray-900">
            <div class="text-lg font-semibold mb-2">Use existing reward</div>
            <div class="text-sm text-slate-600 dark:text-slate-400 mb-4">
                Enter the existing Twitch reward ID and we'll link it.
            </div>
            <form hx-post="{{ .ExistingPostURL }}" hx-target="#tab-content" hx-swap="outerHTML">
                <input type="text" name="twitch_reward_id" placeholder="Reward ID"
                    value="{{ .ExistingRewardID }}"
                    class="w-full px-2 py-1 {{template "input-class"}}" />
                <button type="submit" class="w-full mt-3 px-4 py-2 border-2 {{template "button-2"}} font-semibold">
                    Link reward
                </button>
            </form>
        </div>
    </div>
</div>
